<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遇事不决·可问清风</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="user-bar" id="user-bar">
  <button class="btn-history" id="btn-history" onclick="toggleHistory()" style="display:none" title="历史记录">记录</button>
  <button class="btn-login" id="btn-login" onclick="showAuth('login')">登录</button>
  <div class="user-info" id="user-info" style="display:none">
    <span class="uname" id="uname"></span>
    <span class="quota" id="quota"></span>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
</div>

<!-- ===== INPUT ===== -->
<div id="input-state">
  <div class="page-title">梅花易数</div>
  <div class="page-subtitle">以时起卦，以象观心</div>
  <div class="input-box">
    <div class="question-categories" role="radiogroup" aria-label="问题分类">
      <button type="button" class="category-chip" data-category="事业" role="radio" aria-checked="false">事业</button>
      <button type="button" class="category-chip" data-category="感情" role="radio" aria-checked="false">感情</button>
      <button type="button" class="category-chip" data-category="财运" role="radio" aria-checked="false">财运</button>
      <button type="button" class="category-chip" data-category="学业" role="radio" aria-checked="false">学业</button>
      <button type="button" class="category-chip" data-category="健康" role="radio" aria-checked="false">健康</button>
      <button type="button" class="category-chip active" data-category="其他" role="radio" aria-checked="true">其他</button>
    </div>
    <textarea id="question-input" maxlength="300" aria-describedby="question-help question-count" placeholder="心中所想，落笔成卦……&#10;&#10;可以是任何问题：事业、感情、抉择、困惑……" rows="4"></textarea>
    <div class="question-assist">
      <div class="assist-header">
        <span class="assist-label">问题辅助</span>
        <span class="question-count" id="question-count">0/300</span>
      </div>
      <div class="template-row" aria-label="问题模板">
        <button type="button" class="template-chip" data-template="我现在面临一个选择：A 是……，B 是……。想请你看看哪边更顺势，以及我需要注意什么。">套用选择取舍模板</button>
        <button type="button" class="template-chip" data-template="我想推进一件事：……。目前卡在……。请看看当下阻力和下一步怎么做。">套用推进事项模板</button>
        <button type="button" class="template-chip" data-template="我和对方/团队的关系最近……。想看看互动中的关键问题和合适的应对方式。">套用关系互动模板</button>
      </div>
      <div class="question-help" id="question-help">建议写清背景、选择项和最想判断的行动，解读会更聚焦。</div>
    </div>
    <button class="btn-divine" id="btn-divine" onclick="startDivine()">起 卦</button>
  </div>
  <div class="input-hint">卦象解读仅供娱乐参考，请勿作为现实决策依据。</div>
</div>

<!-- ===== LOADING ===== -->
<div id="loading-state">
  <div class="loading-hexagram" id="loading-hex"></div>
  <div class="loading-text" id="loading-text">卦象推演中……</div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-state"></div>

<!-- ===== AUTH MODAL ===== -->
<div class="auth-overlay" id="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-title" aria-hidden="true">
  <div class="auth-panel">
    <div class="auth-title"><span id="auth-title">账户</span><button class="auth-close" onclick="closeAuth()" aria-label="关闭账户面板">✕</button></div>
    <div class="auth-tabs" role="tablist" aria-label="账户操作">
      <button type="button" class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')" role="tab" aria-selected="true" aria-controls="form-login">登录</button>
      <button type="button" class="auth-tab" data-tab="register" onclick="switchAuthTab('register')" role="tab" aria-selected="false" aria-controls="form-register">注册</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>
    <form class="auth-form active" id="form-login" onsubmit="doLogin(event)" role="tabpanel">
      <div class="sg"><label>用户名</label><input type="text" id="login-user" autocomplete="username" required></div>
      <div class="sg"><label>密码</label><input type="password" id="login-pass" autocomplete="current-password" required></div>
      <button type="submit" class="btn-auth-submit">登 录</button>
    </form>
    <form class="auth-form" id="form-register" onsubmit="doRegister(event)" role="tabpanel" hidden>
      <div class="sg"><label>用户名</label><input type="text" id="reg-user" autocomplete="username" minlength="2" maxlength="50" required></div>
      <div class="sg"><label>密码（至少6位）</label><input type="password" id="reg-pass" autocomplete="new-password" minlength="6" required></div>
      <button type="submit" class="btn-auth-submit">注 册</button>
    </form>
  </div>
</div>

<!-- ===== HISTORY SIDEBAR ===== -->
<div class="history-overlay" id="history-overlay" onclick="toggleHistory()" aria-hidden="true"></div>
<aside class="history-sidebar" id="history-sidebar" role="dialog" aria-modal="true" aria-labelledby="history-title" aria-hidden="true">
  <div class="history-title"><span id="history-title">起卦记录</span><button class="history-close" onclick="toggleHistory()" aria-label="关闭历史记录">✕</button></div>
  <div class="history-tools">
    <input type="search" id="history-search" placeholder="搜索问题关键词" aria-label="搜索历史问题">
    <select id="history-category" aria-label="按分类筛选历史">
      <option value="">全部分类</option>
      <option value="事业">事业</option>
      <option value="感情">感情</option>
      <option value="财运">财运</option>
      <option value="学业">学业</option>
      <option value="健康">健康</option>
      <option value="其他">其他</option>
    </select>
  </div>
  <div id="history-list"><div class="history-empty">暂无记录</div></div>
  <div class="history-pager" id="history-pager"></div>
  <div class="history-detail" id="history-detail"></div>
</aside>

<script src="assets/app.js" defer></script>
</body>
</html>
